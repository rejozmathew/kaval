name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src

      - name: Validate checked-in schemas
        run: |
          python -c "from pathlib import Path; from kaval.schema_export import export_phase0_schemas; export_phase0_schemas(Path('schemas'))"
          git diff --exit-code -- schemas

      - name: Unit tests
        run: python -m pytest tests/unit

      - name: Contract tests
        run: python -m pytest tests/contract

      - name: Integration tests
        run: python -m pytest tests/integration
