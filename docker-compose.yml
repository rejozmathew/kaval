services:
  kaval:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaval
    restart: unless-stopped
    environment:
      KAVAL_APPROVAL_HMAC_SECRET: local-dev-approval-secret
    ports:
      - "9800:9800"
    volumes:
      - kaval-data:/data
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  kaval-data:
