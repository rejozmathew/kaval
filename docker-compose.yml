services:
  kaval:
    image: ${KAVAL_IMAGE:-ghcr.io/rejozmathew/kaval:private-testing}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${KAVAL_CONTAINER_NAME:-kaval}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      KAVAL_APPROVAL_HMAC_SECRET: ${KAVAL_APPROVAL_HMAC_SECRET:-local-dev-approval-secret}
      KAVAL_DATABASE_PATH: /data/kaval.db
      KAVAL_SETTINGS_PATH: /data/kaval.yaml
      KAVAL_SERVICES_DIR: /app/services
      KAVAL_WIDGET_ENABLED: ${KAVAL_WIDGET_ENABLED:-true}
      KAVAL_WIDGET_API_KEY: ${KAVAL_WIDGET_API_KEY:-}
      KAVAL_WIDGET_PUBLIC_URL: ${KAVAL_WIDGET_PUBLIC_URL:-}
      KAVAL_WIDGET_REFRESH_INTERVAL_SECONDS: ${KAVAL_WIDGET_REFRESH_INTERVAL_SECONDS:-60}
      KAVAL_LOCAL_MODEL_API_KEY: ${KAVAL_LOCAL_MODEL_API_KEY:-}
      KAVAL_LOCAL_MODEL_NAME: ${KAVAL_LOCAL_MODEL_NAME:-}
      KAVAL_LOCAL_MODEL_BASE_URL: ${KAVAL_LOCAL_MODEL_BASE_URL:-http://localhost:11434}
      KAVAL_LOCAL_MODEL_TIMEOUT_SECONDS: ${KAVAL_LOCAL_MODEL_TIMEOUT_SECONDS:-30}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      KAVAL_CLOUD_MODEL_NAME: ${KAVAL_CLOUD_MODEL_NAME:-}
      KAVAL_CLOUD_MODEL_PROVIDER: ${KAVAL_CLOUD_MODEL_PROVIDER:-anthropic}
      KAVAL_CLOUD_MODEL_BASE_URL: ${KAVAL_CLOUD_MODEL_BASE_URL:-}
      KAVAL_CLOUD_MODEL_API_KEY_ENV: ${KAVAL_CLOUD_MODEL_API_KEY_ENV:-ANTHROPIC_API_KEY}
      KAVAL_CLOUD_MODEL_TIMEOUT_SECONDS: ${KAVAL_CLOUD_MODEL_TIMEOUT_SECONDS:-45}
      KAVAL_CLOUD_MODEL_MAX_OUTPUT_TOKENS: ${KAVAL_CLOUD_MODEL_MAX_OUTPUT_TOKENS:-1600}
      KAVAL_CLOUD_MODEL_MAX_CALLS_PER_INCIDENT: ${KAVAL_CLOUD_MODEL_MAX_CALLS_PER_INCIDENT:-3}
      KAVAL_CLOUD_MODEL_MAX_CALLS_PER_DAY: ${KAVAL_CLOUD_MODEL_MAX_CALLS_PER_DAY:-20}
      KAVAL_CLOUD_ESCALATION_LOCAL_CONFIDENCE_LT: ${KAVAL_CLOUD_ESCALATION_LOCAL_CONFIDENCE_LT:-0.6}
      KAVAL_CLOUD_ESCALATION_FINDING_COUNT_GT: ${KAVAL_CLOUD_ESCALATION_FINDING_COUNT_GT:-3}
      KAVAL_NOTIFICATION_ENABLED: ${KAVAL_NOTIFICATION_ENABLED:-true}
      KAVAL_NOTIFICATION_URLS: ${KAVAL_NOTIFICATION_URLS:-}
      KAVAL_TELEGRAM_BOT_TOKEN: ${KAVAL_TELEGRAM_BOT_TOKEN:-}
      KAVAL_TELEGRAM_CHAT_ID: ${KAVAL_TELEGRAM_CHAT_ID:-}
      KAVAL_TELEGRAM_API_BASE_URL: ${KAVAL_TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      KAVAL_TELEGRAM_TIMEOUT_SECONDS: ${KAVAL_TELEGRAM_TIMEOUT_SECONDS:-15}
      KAVAL_TELEGRAM_WEBHOOK_SECRET: ${KAVAL_TELEGRAM_WEBHOOK_SECRET:-}
      KAVAL_WEBHOOK_KEY_UPTIME_KUMA: ${KAVAL_WEBHOOK_KEY_UPTIME_KUMA:-}
      KAVAL_WEBHOOK_KEY_GRAFANA: ${KAVAL_WEBHOOK_KEY_GRAFANA:-}
      KAVAL_WEBHOOK_KEY_PROMETHEUS_ALERTMANAGER: ${KAVAL_WEBHOOK_KEY_PROMETHEUS_ALERTMANAGER:-}
      KAVAL_WEBHOOK_KEY_NETDATA: ${KAVAL_WEBHOOK_KEY_NETDATA:-}
      KAVAL_WEBHOOK_KEY_GENERIC_JSON: ${KAVAL_WEBHOOK_KEY_GENERIC_JSON:-}
      KAVAL_VAULT_AUTO_LOCK_MINUTES: ${KAVAL_VAULT_AUTO_LOCK_MINUTES:-5}
      KAVAL_VOLATILE_CREDENTIAL_TTL_SECONDS: ${KAVAL_VOLATILE_CREDENTIAL_TTL_SECONDS:-1800}
      KAVAL_CORE_LOG_LEVEL: ${KAVAL_CORE_LOG_LEVEL:-info}
    ports:
      - "${KAVAL_HTTP_PORT:-9800}:9800"
    volumes:
      - "${KAVAL_DATA_DIR:-./.data/kaval}:/data"
      - /var/run/docker.sock:/var/run/docker.sock
