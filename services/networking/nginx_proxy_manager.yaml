id: nginx_proxy_manager
name: Nginx Proxy Manager
category: networking
project_url: https://nginxproxymanager.com/
icon: nginx_proxy_manager.svg
match:
  image_patterns:
    - "jc21/nginx-proxy-manager*"
    - "*nginx-proxy-manager*"
  container_name_patterns:
    - "nginx-proxy-manager*"
    - "npm*"
endpoints:
  web_ui:
    port: 81
    path: /
log_signals:
  errors:
    - "SSL routines"
    - "502 Bad Gateway"
    - "connect() failed"
  warnings:
    - "certificate renewal failed"
    - "proxy host offline"
typical_dependencies:
  shares:
    - appdata
common_failure_modes:
  - trigger: "502 Bad Gateway"
    likely_cause: "Upstream service is unavailable or reverse proxy routing is broken"
    check_first:
      - upstream endpoint
      - recent image changes
investigation_context: |
  Nginx Proxy Manager fronts many internal services. Reverse proxy failures are
  often caused by upstream outages, TLS issues, or recent image changes.
inspection:
  surfaces:
    - id: proxy_hosts
      type: api
      description: Proxy host inventory and upstream routing
      endpoint: /api/nginx/proxy-hosts
      auth: token
      auth_header: Authorization
      read_only: true
      facts_provided:
        - proxy_hosts
        - upstream_targets
        - certificate_bindings
      confidence_effect: upgrade_to_runtime_observed
      version_range: ">=2.0,<3.0"
    - id: certificates
      type: api
      description: Certificate inventory and expiry metadata
      endpoint: /api/nginx/certificates
      auth: token
      auth_header: Authorization
      read_only: true
      facts_provided:
        - certificates
        - certificate_domains
        - certificate_expiry
      version_range: ">=2.0,<3.0"
credential_hints:
  identity:
    description: Nginx Proxy Manager login email
    location: Nginx Proxy Manager login form -> Email
    prompt: Provide the Nginx Proxy Manager login email to enable deep inspection.
  secret:
    description: Nginx Proxy Manager login password
    location: Nginx Proxy Manager login form -> Password
    prompt: Provide the Nginx Proxy Manager login password to enable deep inspection.
