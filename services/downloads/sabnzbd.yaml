id: sabnzbd
name: SABnzbd
category: downloads
project_url: https://sabnzbd.org/
icon: sabnzbd.svg
match:
  image_patterns:
    - "lscr.io/linuxserver/sabnzbd*"
    - "binhex/arch-sabnzbd*"
    - "*sabnzbd*"
  container_name_patterns:
    - "sabnzbd*"
endpoints:
  web_ui:
    port: 8080
    path: /
log_signals:
  errors:
    - "Too little diskspace forcing PAUSE"
    - "Failed making SSL connection"
    - "Repair failed"
  warnings:
    - "Cannot connect to server"
    - "Post-processing failed"
typical_dependencies:
  shares:
    - downloads
    - appdata
common_failure_modes:
  - trigger: "Too little diskspace forcing PAUSE"
    likely_cause: "The downloads target is full or unavailable"
    check_first:
      - downloads share capacity
      - downloads share mount
investigation_context: |
  SABnzbd is a Usenet download client. Queue stalls usually come from storage
  exhaustion, unreachable upstream servers, or failed repair and unpack steps.
