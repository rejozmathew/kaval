id: radarr
name: Radarr
category: arr
project_url: https://radarr.video/
icon: radarr.svg
match:
  image_patterns:
    - "lscr.io/linuxserver/radarr*"
    - "hotio/radarr*"
    - "*radarr*"
  container_name_patterns:
    - "radarr*"
endpoints:
  web_ui:
    port: 7878
    path: /
  health_api:
    port: 7878
    path: /api/v3/health
    auth: api_key
    auth_header: X-Api-Key
    healthy_when: json_array_empty
log_signals:
  errors:
    - "Unable to connect to indexer"
    - "Download client .* not available"
    - "Import failed"
    - "Database is locked"
  warnings:
    - "No indexers available"
    - "Queue import blocked"
typical_dependencies:
  containers:
    - prowlarr
    - name: delugevpn
      alternatives:
        - qbittorrent
        - transmission
        - sabnzbd
  shares:
    - media
    - downloads
common_failure_modes:
  - trigger: "Download client .* not available"
    likely_cause: "Download client container is down or has lost connectivity"
    check_first:
      - delugevpn
      - qbittorrent
  - trigger: "Unable to connect to indexer"
    likely_cause: "Prowlarr is unavailable or its API key changed"
    check_first:
      - prowlarr
investigation_context: |
  Radarr manages movie downloads. Its health API returns an array of issues,
  where an empty array means healthy. The most common dependency path is
  Radarr -> Prowlarr -> download client -> downloads/media shares.
credential_hints:
  api_key:
    description: Radarr API Key
    location: Radarr Web UI -> Settings -> General -> API Key
